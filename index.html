<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>멀티폰샵 — 업무 툴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F2EC;--card:#fff;--dark:#18160F;--accent:#E05C1A;
  --muted:#8A7968;--border:#DDD6CA;--green:#1E6B45;--green-bg:#E6F4ED;
  --sans:'Noto Sans KR',sans-serif;--mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--dark);min-height:100vh;display:flex;flex-direction:column;}

header{background:var(--dark);padding:0 32px;height:60px;display:flex;align-items:center;gap:14px;border-bottom:3px solid var(--accent);}
.logo{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;color:#fff;letter-spacing:-.02em;}
.logo-text{color:#fff;font-size:16px;font-weight:700;letter-spacing:.04em;}
.logo-sub{color:#666;font-size:12px;font-weight:300;margin-left:4px;}

.hero{padding:52px 24px 36px;text-align:center;}
.hero h1{font-size:28px;font-weight:900;color:var(--dark);margin-bottom:8px;letter-spacing:-.02em;}
.hero p{font-size:15px;color:var(--muted);line-height:1.6;}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:18px;max-width:800px;margin:0 auto;padding:0 20px 48px;}

.tool-card{background:var(--card);border-radius:20px;border:1px solid var(--border);padding:28px 24px;text-decoration:none;color:inherit;transition:all .2s;display:flex;flex-direction:column;gap:14px;cursor:pointer;}
.tool-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.1);border-color:var(--accent);}
.tool-card.green:hover{border-color:var(--green);}

.tool-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;}
.tool-icon.orange{background:#FFF0E8;}
.tool-icon.green{background:var(--green-bg);}

.tool-name{font-size:18px;font-weight:700;color:var(--dark);}
.tool-desc{font-size:13px;color:var(--muted);line-height:1.7;}

.tool-tags{display:flex;flex-wrap:wrap;gap:5px;}
.tag{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;}
.tag.o{background:#FFF0E8;color:#C84A10;}
.tag.g{background:var(--green-bg);color:var(--green);}
.tag.gray{background:#F2EDE6;color:#8A7968;}

.tool-arrow{margin-top:auto;font-size:13px;font-weight:700;display:flex;align-items:center;gap:4px;}
.tool-card:hover .tool-arrow{color:var(--accent);}
.tool-card.green:hover .tool-arrow{color:var(--green);}

footer{margin-top:auto;padding:20px;text-align:center;font-size:12px;color:#bbb;font-family:var(--mono);}
</style>
</head>
<body>

<header>
  <div class="logo">MP</div>
  <div class="logo-text">멀티폰샵 <span class="logo-sub">업무 툴</span></div>
</header>

<div class="hero">
  <h1>멀티폰샵 업무 시스템</h1>
  <p>아래 툴을 클릭해서 바로 사용하세요</p>
</div>

<div class="grid">

  <a class="tool-card" href="stock.html">
    <div class="tool-icon orange">📱</div>
    <div>
      <div class="tool-name">재고등록 + 번장 글등록</div>
      <div class="tool-desc">
        중고폰 재고를 구글 시트에 바로 등록하고<br>
        번개장터 제목·설명을 자동으로 생성해요
      </div>
    </div>
    <div class="tool-tags">
      <span class="tag o">번개장터</span>
      <span class="tag gray">구글 시트 연동</span>
      <span class="tag gray">글 자동생성</span>
    </div>
    <div class="tool-arrow">바로 열기 →</div>
  </a>

  <a class="tool-card green" href="account.html">
    <div class="tool-icon green">🔐</div>
    <div>
      <div class="tool-name">업무 계정 관리</div>
      <div class="tool-desc">
        업무에 사용하는 아이디·비밀번호를<br>
        한눈에 보고 빠르게 복사해요
      </div>
    </div>
    <div class="tool-tags">
      <span class="tag g">PIN 잠금</span>
      <span class="tag gray">아이디/비밀번호</span>
      <span class="tag gray">빠른 복사</span>
    </div>
    <div class="tool-arrow">바로 열기 →</div>
  </a>

</div>

<footer>multiphoneshop · 내부 업무용</footer>

</body>
</html>
